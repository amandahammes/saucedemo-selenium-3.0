plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation("tools.jackson.core:jackson-databind:3.1.1")
    testImplementation("net.datafaker:datafaker:2.5.4")
    testImplementation("com.aventstack:extentreports:5.1.1")
    testImplementation("org.assertj:assertj-core:3.27.7")
    testImplementation("org.apache.logging.log4j:log4j-slf4j2-impl:2.25.3")
    testImplementation("org.seleniumhq.selenium:selenium-java:4.18.1")
    testImplementation("io.github.bonigarcia:webdrivermanager:6.3.3")
    testImplementation platform("org.junit:junit-bom:5.10.0")
    testImplementation("org.junit.jupiter:junit-jupiter")
    testImplementation("org.junit.jupiter:junit-jupiter-params")
}

test {
    useJUnitPlatform()
}